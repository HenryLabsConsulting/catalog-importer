<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" font-family="Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="960" height="600" fill="#f6f8f7"/>
  <g transform="translate(40,32)">
    <!-- logo -->
    <rect x="0" y="0" width="28" height="28" rx="8" fill="#1f7a5a"/>
    <path d="M14 7 L20 14 H16 V20 H12 V14 H8 Z" fill="#fff"/>
    <text x="38" y="20" fill="#1f2733" font-size="18" font-weight="700">Catalog Importer</text>
    <text x="0" y="60" fill="#1f2733" font-size="22" font-weight="700">Your import file is ready</text>

    <!-- stat cards -->
    <g transform="translate(0,82)">
      <rect x="0" y="0" width="276" height="78" rx="12" fill="#fff" stroke="#e3e7ee"/>
      <text x="18" y="42" fill="#1f2733" font-size="26" font-weight="700">15</text>
      <text x="18" y="62" fill="#697686" font-size="13">rows read</text>
      <rect x="292" y="0" width="276" height="78" rx="12" fill="#fff" stroke="#e3e7ee"/>
      <text x="310" y="42" fill="#1f7a5a" font-size="26" font-weight="700">12</text>
      <text x="310" y="62" fill="#697686" font-size="13">ready to import</text>
      <rect x="584" y="0" width="276" height="78" rx="12" fill="#fff" stroke="#e3e7ee"/>
      <text x="602" y="42" fill="#b3261e" font-size="26" font-weight="700">3</text>
      <text x="602" y="62" fill="#697686" font-size="13">skipped</text>
    </g>

    <!-- download -->
    <rect x="0" y="178" width="220" height="42" rx="10" fill="#1f7a5a"/>
    <text x="110" y="204" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Download import_ready.csv</text>
    <text x="238" y="204" fill="#697686" font-size="13">Convert another file</text>

    <!-- skipped table -->
    <rect x="0" y="238" width="860" height="132" rx="12" fill="#fff" stroke="#e3e7ee"/>
    <text x="18" y="262" fill="#1f2733" font-size="14" font-weight="600">Skipped rows (3)</text>
    <text x="18" y="288" fill="#697686" font-size="12">Row</text>
    <text x="80" y="288" fill="#697686" font-size="12">Item</text>
    <text x="220" y="288" fill="#697686" font-size="12">Reason</text>
    <line x1="18" y1="296" x2="842" y2="296" stroke="#eef1f5"/>
    <text x="18" y="318" fill="#1f2733" font-size="12.5">7</text>
    <text x="80" y="318" fill="#1f2733" font-size="12.5">1006</text>
    <text x="220" y="318" fill="#b3261e" font-size="12.5">missing product name</text>
    <line x1="18" y1="328" x2="842" y2="328" stroke="#eef1f5"/>
    <text x="18" y="348" fill="#1f2733" font-size="12.5">8</text>
    <text x="80" y="348" fill="#1f2733" font-size="12.5">1007</text>
    <text x="220" y="348" fill="#b3261e" font-size="12.5">unusable price: '-3.00'</text>

    <!-- preview table -->
    <rect x="0" y="386" width="860" height="150" rx="12" fill="#fff" stroke="#e3e7ee"/>
    <text x="18" y="410" fill="#1f2733" font-size="14" font-weight="600">Preview</text>
    <text x="18" y="434" fill="#697686" font-size="11.5">sku</text>
    <text x="110" y="434" fill="#697686" font-size="11.5">name</text>
    <text x="330" y="434" fill="#697686" font-size="11.5">price</text>
    <text x="400" y="434" fill="#697686" font-size="11.5">url_slug</text>
    <text x="640" y="434" fill="#697686" font-size="11.5">stock</text>
    <text x="710" y="434" fill="#697686" font-size="11.5">available</text>
    <line x1="18" y1="442" x2="842" y2="442" stroke="#eef1f5"/>
    <g font-size="12" fill="#1f2733">
      <text x="18" y="464">SKU-1001</text><text x="110" y="464">Copper Compression Fitting 1/2"</text>
      <text x="330" y="464">12.99</text><text x="400" y="464">copper-compression-fitting-1-2</text>
      <text x="640" y="464">42</text><text x="710" y="464">Yes</text>
      <line x1="18" y1="474" x2="842" y2="474" stroke="#eef1f5"/>
      <text x="18" y="496">1002</text><text x="110" y="496">PEX Crimp Ring (bag of 100)</text>
      <text x="330" y="496">8.50</text><text x="400" y="496">pex-crimp-ring-bag-of-100</text>
      <text x="640" y="496">0</text><text x="710" y="496">No</text>
      <line x1="18" y1="506" x2="842" y2="506" stroke="#eef1f5"/>
      <text x="18" y="528">SKU-1004</text><text x="110" y="528">Thread Seal Tape</text>
      <text x="330" y="528">1.29</text><text x="400" y="528">thread-seal-tape</text>
      <text x="640" y="528">500</text><text x="710" y="528">Yes</text>
    </g>
  </g>
</svg>
